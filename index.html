<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wills Astro App</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .top-bar { width: 100%; display: flex; justify-content: flex-end; padding: 15px; box-sizing: border-box; }
        .menu-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #888; }
        .side-menu {
            position: fixed; top: 0; right: -250px; width: 250px; height: 100%;
            background-color: #1e1e1e; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            transition: right 0.3s ease; z-index: 1000; padding: 20px; box-sizing: border-box;
        }
        .side-menu.active { right: 0; }
        .close-btn { background: none; border: none; color: #888; font-size: 20px; float: right; cursor: pointer; }
        
        .container {
            background-color: #1e1e1e; padding: 30px; border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); text-align: center;
            max-width: 400px; width: 90%; margin-top: 10px;
        }

        /* New Data Dashboard Style */
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            margin: 20px 0; padding: 15px; background: #252525; border-radius: 12px;
        }
        .stat-item { display: flex; flex-direction: column; font-size: 13px; color: #aaa; }
        .stat-value { font-size: 16px; color: #fff; font-weight: bold; margin-top: 4px; }

        #status-icon { font-size: 70px; margin: 10px 0; }
        h1 { margin: 0; font-size: 20px; color: #eee; }
        h2 { font-size: 16px; margin-top: 25px; color: #4caf50; border-bottom: 1px solid #333; padding-bottom: 8px; }
        
        .hours-list { list-style: none; padding: 0; margin-top: 10px; text-align: left; }
        .hour-item {
            background-color: #2c2c2c; margin: 8px 0; padding: 12px;
            border-radius: 10px; display: flex; flex-direction: column; gap: 4px;
        }
        .hour-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 15px; }
        .btn-update { width: 100%; padding: 12px; background-color: #333; color: #fff; border: 1px solid #444; border-radius: 8px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="menu-btn" onclick="toggleMenu()">⚙️</button>
    </div>

    <div id="sideMenu" class="side-menu">
        <button class="close-btn" onclick="toggleMenu()">✕</button>
        <h3>Settings</h3>
        <button onclick="nukeCache()" class="btn-update">Force Update App</button>
    </div>

    <div class="container">
        <h1 id="header-title">Astro Conditions</h1>
        
        <div id="status-icon">⏳</div>
        <p id="status-text" style="font-weight: bold;">Loading forecast...</p>

        <div class="stats-grid" id="current-stats" style="display:none;">
            <div class="stat-item">Cloud Cover<div class="stat-value" id="val-clouds">--</div></div>
            <div class="stat-item">Moon Phase<div class="stat-value" id="val-moon">--</div></div>
            <div class="stat-item">Illumination<div class="stat-value" id="val-illum">--</div></div>
            <div class="stat-item">Next Window<div class="stat-value" id="val-window">--</div></div>
        </div>

        <div id="forecast-section" style="display:none;">
            <h2>Clear Windows</h2>
            <ul id="hours-list" class="hours-list"></ul>
        </div>
    </div>

    <script>
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }

        async function nukeCache() {
            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (let reg of registrations) { await reg.unregister(); }
            }
            if ('caches' in window) {
                const keys = await caches.keys();
                for (let key of keys) { await caches.delete(key); }
            }
            window.location.href = window.location.pathname + '?v=' + new Date().getTime();
        }

        const LAT = 42.37;
        const LON = -83.47;
        const CLOUD_THRESHOLD = 30; 
        const OPEN_METEO_URL = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=cloud_cover&timezone=auto&forecast_days=2`;

        function getMoonData(date) {
            const synodicMonth = 29.53058867;
            const knownNewMoon = new Date(Date.UTC(2000, 0, 6, 18, 14, 0)).getTime();
            const diff = date.getTime() - knownNewMoon;
            const days = diff / (1000 * 60 * 60 * 24);
            let phase = (days % synodicMonth) / synodicMonth;
            if (phase < 0) phase += 1;
            const illumination = Math.round((1 - Math.cos(phase * 2 * Math.PI)) / 2 * 100);
            
            let name = "";
            if (phase < 0.03 || phase > 0.97) name = "New Moon";
            else if (phase < 0.22) name = "Waxing Crescent";
            else if (phase < 0.28) name = "First Quarter";
            else if (phase < 0.47) name = "Waxing Gibbous";
            else if (phase < 0.53) name = "Full Moon";
            else if (phase < 0.72) name = "Waning Gibbous";
            else if (phase < 0.78) name = "Last Quarter";
            else name = "Waning Crescent";
            return { name, illumination };
        }

        async function fetchAstroData() {
            try {
                const response = await fetch(OPEN_METEO_URL);
                const data = await response.json();
                processForecast(data);
            } catch (err) {
                document.getElementById('status-text').innerText = "Connection Error";
            }
        }

        function processForecast(data) {
            const clearHours = [];
            const times = data.hourly.time;
            const clouds = data.hourly.cloud_cover;
            const now = new Date();
            
            // Get Current Stats for the Dashboard
            const currentClouds = clouds[0]; 
            const currentMoon = getMoonData(now);

            document.getElementById('val-clouds').innerText = currentClouds + "%";
            document.getElementById('val-moon').innerText = currentMoon.name;
            document.getElementById('val-illum').innerText = currentMoon.illumination + "%";
            document.getElementById('current-stats').style.display = 'grid';

            for (let i = 0; i < times.length; i++) {
                const hourTime = new Date(times[i]);
                if (hourTime >= now && hourTime < new Date(now.getTime() + 24 * 60 * 60 * 1000)) {
                    const hr = hourTime.getHours();
                    if ((hr >= 20 || hr <= 5) && clouds[i] <= CLOUD_THRESHOLD) {
                        clearHours.push({
                            time: hourTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                            cloud: clouds[i],
                            moon: getMoonData(hourTime)
                        });
                    }
                }
            }

            const icon = document.getElementById('status-icon');
            const text = document.getElementById('status-text');
            const list = document.getElementById('hours-list');
            const forecastSection = document.getElementById('forecast-section');
            
            list.innerHTML = ''; 

            if (clearHours.length > 0) {
                icon.innerText = "👍";
                icon.style.color = "#4caf50";
                text.innerText = "Skies are Dark & Clear";
                document.getElementById('val-window').innerText = clearHours[0].time;
                forecastSection.style.display = 'block';
                
                clearHours.forEach(h => {
                    const li = document.createElement('li');
                    li.className = 'hour-item';
                    li.innerHTML = `
                        <div class="hour-header"><span>${h.time}</span><span style="color:#888; font-size:12px;">${h.moon.name}</span></div>
                        <div style="font-size:13px; color:#aaa;">☁️ Clouds: ${h.cloud}% | 🌙 Illum: ${h.moon.illumination}%</div>`;
                    list.appendChild(li);
                });
            } else {
                icon.innerText = "👎";
                icon.style.color = "#f44336";
                text.innerText = "Conditions Suboptimal";
                document.getElementById('val-window').innerText = "None";
                forecastSection.style.display = 'none';
            }
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
        fetchAstroData();
    </script>
</body>
</html>
