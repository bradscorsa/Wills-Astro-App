<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wills Astro App</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .top-bar { width: 100%; display: flex; justify-content: flex-end; }
        .menu-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #ffd700; }
        .container { max-width: 400px; width: 100%; display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; text-align: left; }
        .stat-item { background: #252525; padding: 10px; border-radius: 8px; font-size: 12px; color: #aaa; }
        .stat-value { color: #fff; font-weight: bold; font-size: 14px; margin-top: 4px; }
        .target-card { background: #252525; border-radius: 10px; margin-bottom: 10px; overflow: hidden; text-align: left; border: 1px solid #333; }
        .target-info { padding: 10px; }
        .target-name { color: #4caf50; font-weight: bold; }
        .btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #status-icon { font-size: 60px; margin: 10px; }
    </style>
</head>
<body>
    <div class="top-bar"><button class="menu-btn" onclick="document.getElementById('sideMenu').style.display='block'">✨</button></div>

    <div id="sideMenu" style="display:none; position:fixed; top:0; right:0; width:250px; height:100%; background:#1e1e1e; z-index:100; padding:20px; box-shadow:-2px 0 10px #000;">
        <button onclick="this.parentElement.style.display='none'" style="color:#888; background:none; border:none; float:right;">✕</button>
        <h3>Settings</h3>
        <button class="btn" style="background:#2196F3; color:#fff;" onclick="getGPS()">🛰️ GPS Sync</button>
        <button class="btn" style="background:#444; color:#fff;" onclick="nukeCache()">Force Update</button>
    </div>

    <div class="container">
        <div class="box">
            <div id="display-city" style="color:#4caf50; font-weight:bold;">Plymouth, MI</div>
            <div id="status-icon">⏳</div>
            <div id="status-text">Loading...</div>
        </div>

        <div class="box">
            <div class="stats-grid">
                <div class="stat-item">Clouds<div class="stat-value" id="val-clouds">--</div></div>
                <div class="stat-item">Moon<div class="stat-value" id="val-moon">--</div></div>
                <div class="stat-item">Moon Light<div class="stat-value" id="val-illum">--</div></div>
                <div class="stat-item">Next Clear<div class="stat-value" id="val-window">--</div></div>
            </div>
        </div>

        <div class="box">
            <h3 style="margin-top:0;">Suggested Targets</h3>
            <div id="targets-list"></div>
        </div>
    </div>

    <script>
        let lat = localStorage.getItem('astroLat') || 42.37;
        let lon = localStorage.getItem('astroLon') || -83.47;
        let city = localStorage.getItem('astroCity') || "Plymouth, MI";

        async function nukeCache() {
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                for (let r of regs) { await r.unregister(); }
            }
            window.location.reload(true);
        }

        function getGPS() {
            navigator.geolocation.getCurrentPosition(async (p) => {
                lat = p.coords.latitude.toFixed(4);
                lon = p.coords.longitude.toFixed(4);
                const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
                const d = await res.json();
                city = d.city || d.locality || "Unknown";
                localStorage.setItem('astroLat', lat);
                localStorage.setItem('astroLon', lon);
                localStorage.setItem('astroCity', city);
                location.reload();
            });
        }

        function updateTargets() {
            const list = [
                { name: "M-51 Whirlpool Galaxy", desc: "Face-on spiral galaxy." },
                { name: "M-81 Bode's Galaxy", desc: "Grand design spiral." }
            ];
            document.getElementById('targets-list').innerHTML = list.map(t => `
                <div class="target-card"><div class="target-info"><div class="target-name">${t.name}</div><div style="font-size:12px; color:#aaa;">${t.desc}</div></div></div>
            `).join('');
        }

        async function fetchData() {
            document.getElementById('display-city').innerText = city;
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=cloud_cover&timezone=auto&forecast_days=1`);
                const d = await res.json();
                document.getElementById('val-clouds').innerText = d.hourly.cloud_cover[0] + "%";
                document.getElementById('status-icon').innerText = d.hourly.cloud_cover[0] < 30 ? "👍" : "👎";
                document.getElementById('status-text').innerText = d.hourly.cloud_cover[0] < 30 ? "Clear Skies" : "Cloudy";
                // Simplified Moon for safety
                document.getElementById('val-moon').innerText = "Waning";
                document.getElementById('val-illum').innerText = "15%";
                document.getElementById('val-window').innerText = "Tonight";
            } catch (e) { document.getElementById('status-text').innerText = "Error loading data"; }
        }

        updateTargets();
        fetchData();
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
    </script>
</body>
</html>
