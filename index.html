<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wills Astro App</title>
    <link rel="manifest" href="./manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- SPACEX MISSION CONTROL THEME --- */
        body { 
            font-family: 'Rajdhani', sans-serif; 
            background-color: #000000; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            transition: 0.3s; 
            letter-spacing: 0.5px; 
        }
        
        .top-bar { width: 100%; display: flex; justify-content: flex-end; align-items: center; gap: 15px; z-index: 10; }
        .app-version { color: #555; font-size: 12px; margin-right: auto; padding-left: 5px; font-family: 'Orbitron', monospace; letter-spacing: 1px; }
        .menu-btn { background: none; border: 1px solid transparent; cursor: pointer; color: #fff; padding: 5px; display: flex; transition: 0.2s; border-radius: 2px; }
        .menu-btn:active { transform: scale(0.85); background: #222; }
        
        .screen-container { max-width: 400px; width: 100%; display: flex; flex-direction: column; gap: 15px; margin-top: 10px; padding-bottom: 50px; transition: max-width 0.3s ease; }
        
        /* Tactical Panels */
        .panel { 
            background: #070707; 
            padding: 25px; 
            border: 1px solid #222; 
            border-top: 2px solid #4caf50; 
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8); 
            text-align: center; 
            transition: 0.3s; 
            position: relative; 
        }
        #pro-data-box { border-top-color: #8b5cf6; }

        .location-label { color: #4caf50; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
        .coord-label { font-size: 11px; color: #555; font-family: 'Orbitron', monospace; margin-top: 6px; display: block; letter-spacing: 1px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; text-align: left; }
        .stat-item { background: #0a0a0a; padding: 12px; border: 1px solid #1a1a1a; font-size: 11px; color: #777; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .stat-item.full-span { grid-column: 1 / -1; text-align: center; } 
        .stat-value { color: #fff; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 14px; margin-top: 6px; text-transform: uppercase; transition: color 0.3s ease; }
        
        .target-card { background: #0a0a0a; margin-bottom: 10px; padding: 15px; text-align: left; border: 1px solid #222; border-left: 3px solid #333; transition: 0.2s; overflow: hidden; display: flex; flex-direction: column; }
        .target-card:active { transform: scale(0.98); background: #111; }
        .target-card.completed { border-left-color: #4caf50; background: rgba(76, 175, 80, 0.05); border-color: rgba(76,175,80,0.2); }
        .target-card.completed .target-name { color: #555; text-decoration: line-through; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .card-image { width: calc(100% + 30px); height: 120px; margin: -15px -15px 15px -15px; background-size: cover; background-position: center; display: none; animation: fadeIn 0.5s ease; border-bottom: 1px solid #222; filter: grayscale(40%) contrast(120%); }
        
        .target-name { color: #fff; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 14px; margin-top: 8px; transition: 0.3s; cursor: pointer; display: flex; align-items: center; gap: 6px; letter-spacing: 1px; text-transform: uppercase; }
        .target-name:active { color: #4caf50; }
        
        .btn { width: 100%; padding: 14px; margin-top: 10px; border: none; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn-scan { background: transparent; color: #4caf50; border: 1px solid #4caf50; box-shadow: inset 0 0 10px rgba(76,175,80,0.1); margin-bottom: 5px; }
        .btn-scan:active { background: #4caf50; color: #000; }
        .btn-nav { background: transparent; color: #888; border: 1px solid #333; margin-bottom: 20px; }
        
        .filter-select { width: 100%; padding: 12px; background: #0a0a0a; color: #fff; border: 1px solid #333; margin-bottom: 15px; font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; outline: none; text-transform: uppercase; letter-spacing: 1px; }
        
        .progress-text { font-size: 12px; color: #777; margin-bottom: 15px; display: block; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Live Data Pulsing Animation */
        @keyframes pulse {
            0% { filter: drop-shadow(0 0 2px currentColor); opacity: 0.8; }
            50% { filter: drop-shadow(0 0 12px currentColor); opacity: 1; }
            100% { filter: drop-shadow(0 0 2px currentColor); opacity: 0.8; }
        }
        .live-data { animation: pulse 3s infinite; }

        #status-icon { font-size: 65px; margin: 10px 0; display: inline-block; }
        #status-text { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; text-transform: uppercase; font-size: 15px; font-weight: 700; }
        
        .bsa-link { color: #64b5f6; font-family: 'Orbitron', sans-serif; font-size: 11px; text-decoration: none; font-weight: 700; padding: 12px; display: inline-block; border: 1px solid #64b5f6; letter-spacing: 1px; margin-bottom: 15px; text-transform: uppercase; }

        /* THE SLIDING MENU */
        #sideMenu { 
            position: fixed; top: 0; right: 0; width: 280px; height: 100%; 
            background: #050505; z-index: 100; padding: 30px; box-sizing: border-box; box-shadow: -10px 0 40px rgba(0,0,0,0.9); 
            border-left: 1px solid #222;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); overflow-y: auto; 
        }
        #sideMenu.open { transform: translateX(0); }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 99; opacity: 0; pointer-events: none; transition: 0.4s; }
        .menu-overlay.open { opacity: 1; pointer-events: auto; }
        .close-btn { color: #555; background: none; border: none; float: right; font-size: 28px; cursor: pointer; padding: 0; transition: 0.2s; }
        .close-btn:active { transform: scale(0.8); color: #fff; }

        /* RED LIGHT OVERRIDES */
        body.red-mode { background: #050000; color: #ff3333; }
        body.red-mode .panel { background: #0a0000; border-color: #300; border-top-color: #ff0000; box-shadow: inset 0 0 20px rgba(255,0,0,0.1); }
        body.red-mode .location-label, body.red-mode .target-name, body.red-mode .stat-value { color: #ff0000 !important; }
        body.red-mode .coord-label, body.red-mode .progress-text, body.red-mode .stat-item { color: #aa0000; }
        body.red-mode .stat-item { background: #110000; border-color: #200; }
        body.red-mode .target-card { background: #0a0000; border-color: #300; border-left-color: #500; }
        body.red-mode .target-card.completed { border-left-color: #ff0000; background: rgba(255,0,0,0.05); }
        body.red-mode .target-card.completed .target-name { color: #500 !important; }
        body.red-mode .btn { background: transparent; color: #ff0000; border: 1px solid #ff0000; box-shadow: inset 0 0 10px rgba(255,0,0,0.1); }
        body.red-mode .btn:active { background: #ff0000; color: #000; }
        body.red-mode .btn-nav { border-color: #500; color: #aa0000; box-shadow: none; }
        body.red-mode #status-icon { color: #ff0000 !important; }
        body.red-mode #status-text { color: #ff0000 !important; }
        body.red-mode #sideMenu { background: #0a0000; border-left-color: #300; }
        body.red-mode .bsa-link { color: #ff0000; border-color: #ff0000; }
        body.red-mode svg { stroke: #ff0000 !important; }
        body.red-mode .svg-fill { fill: #ff0000 !important; }
        body.red-mode .menu-btn svg { stroke: #ff0000 !important; }
        body.red-mode .card-image { filter: sepia(100%) hue-rotate(300deg) saturate(300%) brightness(30%) contrast(150%); border-bottom-color: #300; }
        
        .refresh-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; cursor: pointer; transition: 0.
