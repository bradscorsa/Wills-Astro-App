<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wills Astro App</title>

    <link rel="manifest" href="./manifest.json">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Bar & Menu Styles */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 15px;
            box-sizing: border-box;
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #888;
            transition: color 0.3s;
        }

        .menu-btn:hover { color: #fff; }

        /* Hidden Side Menu */
        .side-menu {
            position: fixed;
            top: 0;
            right: -250px;
            width: 250px;
            height: 100%;
            background-color: #1e1e1e;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            transition: right 0.3s ease;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }

        .side-menu.active { right: 0; }

        .close-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 20px;
            float: right;
            cursor: pointer;
        }

        /* App Content */
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            margin-top: 20px;
        }

        #status-icon { font-size: 80px; margin: 20px 0; }
        h1 { margin: 0; font-size: 22px; color: #eee; }
        
        .hours-list { list-style: none; padding: 0; margin-top: 20px; text-align: left; }
        .hour-item {
            background-color: #2c2c2c;
            margin: 10px 0;
            padding: 14px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .hour-header { display: flex; justify-content: space-between; font-weight: bold; }
        .conditions-row { font-size: 14px; color: #aaa; }
        .good-time { color: #4caf50; }

        /* Utility Buttons */
        .btn-update {
            width: 100%;
            padding: 12px;
            background-color: #333;
            color: #fff;
            border: 1px solid #444;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="menu-btn" onclick="toggleMenu()">⚙️</button>
    </div>

    <div id="sideMenu" class="side-menu">
        <button class="close-btn" onclick="toggleMenu()">✕</button>
        <h3>Settings</h3>
        <p style="font-size: 12px; color: #888;">Manage your application data.</p>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        <button onclick="nukeCache()" class="btn-update">Force Update App</button>
        <p style="font-size: 10px; color: #555; margin-top: 10px; text-align: center;">V 1.0.2</p>
    </div>

    <div class="container">
        <h1>Tonight's Conditions</h1>
        <div id="status-icon" class="loading">⏳</div>
        <p id="status-text" style="color: #ccc;">Checking the skies...</p>
        <ul id="hours-list" class="hours-list"></ul>
    </div>

    <script>
        // --- UI LOGIC ---
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
        }

        // --- CACHE MANAGEMENT ---
        async function nukeCache() {
            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (let reg of registrations) { await reg.unregister(); }
            }
            if ('caches' in window) {
                const keys = await caches.keys();
                for (let key of keys) { await caches.delete(key); }
            }
            alert("App updated! Reloading...");
            window.location.href = window.location.pathname + '?v=' + new Date().getTime();
        }

        // --- WEATHER LOGIC ---
        const LAT = 42.37;
        const LON = -83.47;
        const CLOUD_THRESHOLD = 30; 
        const OPEN_METEO_URL = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=cloud_cover&timezone=auto&forecast_days=2`;

        function getMoonData(date) {
            const synodicMonth = 29.53058867;
            const knownNewMoon = new Date(Date.UTC(2000, 0, 6, 18, 14, 0)).getTime();
            const diff = date.getTime() - knownNewMoon;
            const days = diff / (1000 * 60 * 60 * 24);
            let phase = (days % synodicMonth) / synodicMonth;
            if (phase < 0) phase += 1;
            const illumination = Math.round((1 - Math.cos(phase * 2 * Math.PI)) / 2 * 100);
            
            let phaseName = "";
            if (phase < 0.03 || phase > 0.97) phaseName = "🌑 New Moon";
            else if (phase < 0.22) phaseName = "🌒 Waxing Crescent";
            else if (phase < 0.28) phaseName = "🌓 First Quarter";
            else if (phase < 0.47) phaseName = "🌔 Waxing Gibbous";
            else if (phase < 0.53) phaseName = "🌕 Full Moon";
            else if (phase < 0.72) phaseName = "🌖 Waning Gibbous";
            else if (phase < 0.78) phaseName = "🌗 Last Quarter";
            else phaseName = "🌘 Waning Crescent";

            return { phaseName, illumination };
        }

        async function fetchAstroData() {
            try {
                const response = await fetch(OPEN_METEO_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                processForecast(data);
            } catch (err) {
                document.getElementById('status-icon').innerText = "🛑";
                document.getElementById('status-text').innerText = "Network Error: Check connection.";
            }
        }

        function processForecast(data) {
            const clearHours = [];
            const times = data.hourly.time;
            const clouds = data.hourly.cloud_cover;
            const now = new Date();
            
            for (let i = 0; i < times.length; i++) {
                const hourTime = new Date(times[i]);
                if (hourTime >= now && hourTime < new Date(now.getTime() + 24 * 60 * 60 * 1000)) {
                    const hourOfDay = hourTime.getHours();
                    const isDark = hourOfDay >= 20 || hourOfDay <= 5;
                    if (isDark && clouds[i] <= CLOUD_THRESHOLD) {
                        const moon = getMoonData(hourTime);
                        clearHours.push({
                            time: hourTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                            cloudCover: clouds[i],
                            moonPhase: moon.phaseName,
                            moonIllum: moon.illumination
                        });
                    }
                }
            }

            const icon = document.getElementById('status-icon');
            const text = document.getElementById('status-text');
            const list = document.getElementById('hours-list');
            list.innerHTML = ''; 

            if (clearHours.length > 0) {
                icon.innerText = "👍";
                icon.style.color = "#4caf50";
                text.innerText = "Prime stargazing conditions:";
                clearHours.forEach(h => {
                    const li = document.createElement('li');
                    li.className = 'hour-item';
                    li.innerHTML = `
                        <div class="hour-header"><span class="good-time">${h.time}</span><span style="font-size:12px; color:#888;">${h.moonPhase}</span></div>
                        <div class="conditions-row">☁️ Clouds: ${h.cloudCover}% | 🌙 Illum: ${h.moonIllum}%</div>`;
                    list.appendChild(li);
                });
            } else {
                icon.innerText = "👎";
                icon.style.color = "#f44336";
                text.innerText = "Skies are too cloudy tonight.";
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
        fetchAstroData();
    </script>
</body>
</html>
