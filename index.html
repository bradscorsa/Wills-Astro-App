<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wills Astro App</title>
    
    <link rel="manifest" href="./manifest.json">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        #status-icon {
            font-size: 100px;
            margin: 20px 0;
            line-height: 1;
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
        }
        .hours-list {
            list-style: none;
            padding: 0;
            margin-top: 20px;
            text-align: left;
        }
        .hour-item {
            background-color: #2c2c2c;
            margin: 10px 0;
            padding: 14px 18px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .hour-header {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            border-bottom: 1px solid #444;
            padding-bottom: 6px;
        }
        .conditions-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 14px;
            color: #cccccc;
        }
        .good-time {
            color: #4caf50;
            font-weight: bold;
        }
        .loading {
            color: #aaaaaa;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tonight's Conditions</h1>
        <div id="status-icon" class="loading">⏳</div>
        <p id="status-text">Checking the skies...</p>
        
        <ul id="hours-list" class="hours-list"></ul>
    </div>

    <script>
        window.addEventListener('error', function(e) {
            document.getElementById('status-icon').innerText = "🛑";
            document.getElementById('status-text').innerText = "Code Error: " + e.message;
        });
        window.addEventListener('unhandledrejection', function(e) {
            document.getElementById('status-icon').innerText = "🛑";
            document.getElementById('status-text').innerText = "Network Error: " + (e.reason || "Failed to load data.");
        });
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        const LAT = 42.37;
        const LON = -83.47;
        const CLOUD_THRESHOLD = 30; 
        const OPEN_METEO_URL = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=cloud_cover&timezone=auto&forecast_days=2`;

        function getMoonData(date) {
            const synodicMonth = 29.53058867;
            const knownNewMoon = new Date(Date.UTC(2000, 0, 6, 18, 14, 0)).getTime();
            const diff = date.getTime() - knownNewMoon;
            const days = diff / (1000 * 60 * 60 * 24);
            let phase = (days % synodicMonth) / synodicMonth;
            if (phase < 0) phase += 1;
            
            const illumination = Math.round((1 - Math.cos(phase * 2 * Math.PI)) / 2 * 100);
            
            let phaseName = "";
            if (phase < 0.03 || phase > 0.97) phaseName = "🌑 New Moon";
            else if (phase < 0.22) phaseName = "🌒 Waxing Crescent";
            else if (phase < 0.28) phaseName = "🌓 First Quarter";
            else if (phase < 0.47) phaseName = "🌔 Waxing Gibbous";
            else if (phase < 0.53) phaseName = "🌕 Full Moon";
            else if (phase < 0.72) phaseName = "🌖 Waning Gibbous";
            else if (phase < 0.78) phaseName = "🌗 Last Quarter";
            else phaseName = "🌘 Waning Crescent";

            return { phaseName, illumination };
        }

        async function fetchAstroData() {
            const response = await fetch(OPEN_METEO_URL);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const data = await response.json();
            processForecast(data);
        }

        function processForecast(data) {
            const clearHours = [];
            const times = data.hourly.time;
            const clouds = data.hourly.cloud_cover;
            const now = new Date();
            
            for (let i = 0; i < times.length; i++) {
                const hourTime = new Date(times[i]);
                
                if (hourTime >= now && hourTime < new Date(now.getTime() + 24 * 60 * 60 * 1000)) {
                    const hourOfDay = hourTime.getHours();
                    const isDark = hourOfDay >= 20 || hourOfDay <= 5;
                    const cloudCoverPercent = clouds[i];

                    if (isDark && cloudCoverPercent <= CLOUD_THRESHOLD) {
                        const timeString = hourTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        const moonData = getMoonData(hourTime);
                        
                        clearHours.push({
                            time: timeString,
                            cloudCover: cloudCoverPercent,
                            moonPhase: moonData.phaseName,
                            moonIllum: moonData.illumination
                        });
                    }
                }
            }

            const iconElement = document.getElementById('status-icon');
            const textElement = document.getElementById('status-text');
            const listElement = document.getElementById('hours-list');
            listElement.innerHTML = ''; 

            if (clearHours.length > 0) {
                iconElement.innerText = "👍";
                iconElement.style.color = "#4caf50";
                
                const maxIllum = Math.max(...clearHours.map(h => h.moonIllum));
                if (maxIllum > 75) {
                    textElement.innerText = "Skies are clear! However, a bright Moon might wash out faint targets. Best hours:";
                } else {
                    textElement.innerText = "Skies are dark and clear! Prime shooting hours:";
                }

                clearHours.forEach(hour => {
                    const li = document.createElement('li');
                    li.className = 'hour-item';
                    li.innerHTML = `
                        <div class="hour-header">
                            <span class="good-time">${hour.time}</span>
                            <span style="font-size: 14px; color: #aaa;">${hour.moonPhase} (${hour.moonIllum}%)</span>
                        </div>
                        <div class="conditions-row">
                            <span>☁️ Cloud Cover: ${hour.cloudCover}%</span>
                        </div>
                    `;
                    listElement.appendChild(li);
                });
            } else {
                iconElement.innerText = "👎";
                iconElement.style.color = "#f44336";
                textElement.innerText = "Not looking great tonight. Too much cloud cover.";
            }
        }

        fetchAstroData();
    </script>
</body>
</html>
