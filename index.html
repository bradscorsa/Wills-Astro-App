    <title>Wills Astro App</title>
    
    <link rel="manifest" href="./manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;

            justify-content: center;

            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #1e1e1e;

            list-style: none;

        .hour-header {
            display: flex;

            font-size: 18px;
            border-bottom: 1px solid #444;
            padding-bottom: 6px;
        }
        .conditions-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 14px;
            color: #cccccc;
        }
        .good-time {
            color: #4caf50;
            font-weight: bold;
        }
        .loading {
            color: #aaaaaa;
            font-style: italic;
        }
    </style>
</head>
