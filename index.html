<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wills Astro App</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        .top-bar { width: 100%; display: flex; justify-content: flex-end; padding: 15px; box-sizing: border-box; position: absolute; top: 0; }
        .menu-btn { background: none; border: none; font-size: 28px; cursor: pointer; color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); z-index: 10; }
        
        .side-menu {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100%;
            background-color: #1e1e1e; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            transition: right 0.3s ease; z-index: 1000; padding: 25px; box-sizing: border-box;
            overflow-y: auto;
        }
        .side-menu.active { right: 0; }
        .close-btn { background: none; border: none; color: #888; font-size: 24px; float: right; cursor: pointer; }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 420px;
            width: 90%;
            margin-top: 60px;
            gap: 15px;
            padding-bottom: 40px;
        }

        .box {
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 100%;
            box-sizing: border-box;
        }

        .status-box { text-align: center; }
        #status-icon { font-size: 70px; margin: 10px 0; }
        h1 { margin: 0; font-size: 20px; color: #eee; }
        .location-info { display: flex; flex-direction: column; margin-top: 8px; font-size: 13px; color: #888; }
        .location-label { color: #4caf50; font-weight: bold; }
        .coord-label { font-size: 10px; font-family: monospace; margin-top: 2px; }

        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            margin-bottom: 20px; padding: 15px; background: #252525; border-radius: 12px;
        }
        .stat-item { display: flex; flex-direction: column; font-size: 11px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 14px; color: #fff; font-weight: bold; margin-top: 4px; }
        h2 { font-size: 16px; margin-top: 5px; color: #4caf50; border-bottom: 1px solid #333; padding-bottom: 8px; text-align: center; }
        .hours-list { list-style: none; padding: 0; margin-top: 10px; text-align: left; }
        .hour-item { background-color: #2c2c2c; margin: 8px 0; padding: 12px; border-radius: 10px; }

        /* Updated Targets Styling */
        .target-card {
            background-color: #252525;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            text-align: left;
            border: 1px solid #333;
        }
        .target-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background-color: #000;
        }
        .target-info { padding: 12px; }
        .target-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .target-code { font-size: 11px; background: #4caf50; color: #000; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .target-name { font-weight: bold; color: #eee; font-size: 16px; margin-top: 4px; display: block; }
        .target-type { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .target-desc { font-size: 12px; color: #aaa; margin-top: 8px; line-height: 1.4; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-gps { background-color: #2196F3; color: white; }
        .btn-save { background-color: #4caf50; color: white; }
        .btn-update { background-color: #333; color: #888; border: 1px solid #444; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="menu-btn" onclick="toggleMenu()">✨</button>
    </div>

    <div id="sideMenu" class="side-menu">
        <button class="close-btn" onclick="toggleMenu()">✕</button>
        <h3 style="margin-top:0;">Observatory Settings</h3>
        <input type="text" id="city-input" placeholder="Enter City, State" style="width:100%; padding:10px; background:#121212; border:1px solid #333; color:white; border-radius:8px; margin-bottom:10px;">
        <button class="btn btn-save" onclick="saveCity()">Search City</button>
        <button class="btn btn-gps" id="gps-btn" onclick="getGPS()">🛰️ GPS Sync</button>
        <button onclick="nukeCache()" class="btn btn-update">Force Refresh App</button>
    </div>

    <div class="container">
        
        <div class="box status-box">
            <h1>Tonight's Skies</h1>
            <div class="location-info">
                <span class="location-label" id="display-city">Plymouth, MI</span>
                <span class="coord-label" id="display-coords">42.3700°N, 83.4700°W</span>
            </div>
            <div id="status-icon">⏳</div>
            <p id="status-text" style="font-weight: bold; margin: 0;">Loading...</p>
        </div>

        <div class="box data-box">
            <div class="stats-grid">
                <div class="stat-item">Sky Overcast<div class="stat-value" id="val-clouds">--</div></div>
                <div class="stat-item">Moon Phase<div class="stat-value" id="val-moon">--</div></div>
                <div class="stat-item">Moon Brightness<div class="stat-value" id="val-illum">--</div></div>
                <div class="stat-item">Next Clear Night<div class="stat-value" id="val-window" style="color:#4caf50;">Searching...</div></div>
            </div>
            <div id="forecast-section" style="display:none;">
                <h2>Tonight's Windows</h2>
                <ul id="hours-list" class="hours-list"></ul>
            </div>
        </div>

        <div class="box">
            <h2>Suggested Targets</h2>
            <div id="targets-list">
                </div>
        </div>

    </div>

    <script>
        let currentLat = localStorage.getItem('astroLat') || 42.3700;
        let currentLon = localStorage.getItem('astroLon') || -83.4700;
        let currentCity = localStorage.getItem('astroCity') || "Plymouth, MI";

        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }

        async function nukeCache() {
            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (let reg of registrations) { await reg.unregister(); }
            }
            window.location.href = window.location.pathname + '?v=' + new Date().getTime();
        }

        function getGPS() {
            const btn = document.getElementById('gps-btn');
            btn.innerText = "🛰️ Pinpointing...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    currentLat = parseFloat(position.coords.latitude).toFixed(4);
                    currentLon = parseFloat(position.coords.longitude).toFixed(4);
                    try {
                        const response = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${currentLat}&longitude=${currentLon}&localityLanguage=en`);
                        const geoData = await response.json();
                        currentCity = (geoData.locality || geoData.city) + ", " + (geoData.principalSubdivisionCode ? geoData.principalSubdivisionCode.split('-')[1] : "");
                    } catch (e) { currentCity = "GPS Position"; }
                    saveAndReload();
                });
            }
        }

        async function saveCity() {
            const city = document.getElementById('city-input').value;
            if (!city) return;
            try {
                const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
                const data = await res.json();
                if (data.results && data.results.length > 0) {
                    currentLat = data.results[0].latitude;
                    currentLon = data.results[0].longitude;
                    currentCity = data.results[0].name + (data.results[0].admin1 ? `, ${data.results[0].admin1}` : "");
                    saveAndReload();
                }
            } catch (e) { alert("Error"); }
        }

        function saveAndReload() {
            localStorage.setItem('astroLat', currentLat);
            localStorage.setItem('astroLon', currentLon);
            localStorage.setItem('astroCity', currentCity);
            location.reload();
        }

        function getMoonData(date) {
            const synodicMonth = 29.53058867;
            const knownNewMoon = new Date(Date.UTC(2000, 0, 6, 18, 14, 0)).getTime();
            const diff = date.getTime() - knownNewMoon;
            const days = diff / (1000 * 60 * 60 * 24);
            let phase = (days % synodicMonth) / synodicMonth;
            if (phase < 0) phase += 1;
            const illumination = Math.round((1 - Math.cos(phase * 2 * Math.PI)) / 2 * 100);
            const names = ["New Moon", "Waxing Crescent", "First Quarter", "Waxing Gibbous", "Full Moon", "Waning Gibbous", "Last Quarter", "Waning Crescent"];
            return { name: names[Math.floor(phase * 8) % 8], illumination };
        }

        function updateTargets() {
            const month = new Date().getMonth();
            const targetsList = document.getElementById('targets-list');
            let seasonalTargets = [];

            // Targeted Catalog Data
            const targets = {
                orion: { code: "M-42", name: "Orion Nebula", type: "Emission Nebula", desc: "The crown jewel of the winter sky. Visible to the naked eye and spectacular in photos.", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Orion_Nebula_-_Hubble_2006_mosaic_18000.jpg/640px-Orion_Nebula_-_Hubble_2006_mosaic_18000.jpg" },
                pleiades: { code: "M-45", name: "The Pleiades", type: "Open Cluster", desc: "The 'Seven Sisters'. A bright cluster of young blue stars surrounded by reflection nebulosity.", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pleiades_large.jpg/640px-Pleiades_large.jpg" },
                whirlpool: { code: "M-51", name: "Whirlpool Galaxy", type: "Spiral Galaxy", desc: "A classic face-on spiral galaxy. Look for the 'bridge' connecting it to its smaller companion.", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/db/Messier51a.jpg/640px-Messier51a.jpg" },
                bodes: { code: "M-81", name: "Bode's Galaxy", type: "Spiral Galaxy", desc: "A bright grand-design spiral galaxy in Ursa Major. Great for wide-field or high zoom.", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/M81_HST_and_SST_and_GALEX.jpg/640px-M81_HST_and_SST_and_GALEX.jpg" },
                andromeda: { code: "M-31", name: "Andromeda Galaxy", type: "Spiral Galaxy", desc: "Our massive galactic neighbor. So large it often requires a wide-field lens to capture the whole thing.", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/M31_09-01-2011_%28re-processed%29.jpg/640px-M31_09-01-2011_%28re-processed%29.jpg" },
                ring: { code: "M-57", name: "Ring Nebula", type: "Planetary Nebula", desc: "The remains of a dying star. Looks like a tiny glowing smoke ring in the sky.", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Messier_57.jpg/640px-Messier_57.jpg" }
            };

            if (month >= 11 || month <= 1) { // Winter (Dec, Jan, Feb)
                seasonalTargets = [targets.orion, targets.pleiades];
            } else if (month >= 2 && month <= 4) { // Spring (March, April, May)
                seasonalTargets = [targets.whirlpool, targets.bodes];
            } else if (month >= 5 && month <= 7) { // Summer (June, July, Aug)
                seasonalTargets = [targets.ring, targets.andromeda];
            } else { // Fall (Sept, Oct, Nov)
                seasonalTargets = [targets.andromeda, targets.pleiades];
            }

            targetsList.innerHTML = seasonalTargets.map(t => `
                <div class="target-card">
                    <img src="${t.img}" class="target-img" alt="${t.name}">
                    <div class="target-info">
                        <div class="target-header">
                            <span class="target-type">${t.type}</span>
                            <span class="target-code">${t.code}</span>
                        </div>
                        <span class="target-name">${t.name}</span>
                        <div class="target-desc">${t.desc}</div>
                    </div>
                </div>
            `).join('');
        }

        async function fetchAstroData() {
            document.getElementById('display-city').innerText = currentCity;
            document.getElementById('display-coords').innerText = `${Math.abs(currentLat)}°${currentLat >= 0 ? 'N':'S'}, ${Math.abs(currentLon)}°${currentLon >= 0 ? 'E':'W'}`;
            
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}&hourly=cloud_cover&timezone=auto&forecast_days=8`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                processForecast(data);
            } catch (err) { document.getElementById('status-text').innerText = "Network Error"; }
        }

        function processForecast(data) {
            const times = data.hourly.time;
            const clouds = data.hourly.cloud_cover;
            const now = new Date();
            const moon = getMoonData(now);
            
            document.getElementById('val-clouds').innerText = clouds[0] + "%";
            document.getElementById('val-moon').innerText = moon.name;
            document.getElementById('val-illum').innerText = moon.illumination + "%";

            const tonightHours = [];
            let nextClearStr = "None in 7 days";

            for (let i = 0; i < times.length; i++) {
                const hourTime = new Date(times[i]);
                const hr = hourTime.getHours();
                const isClear = clouds[i] <= 30;
                const isDark = (hr >= 20 || hr <= 5);

                if (hourTime >= now && hourTime < new Date(now.getTime() + 24*3600000) && isClear && isDark) {
                    tonightHours.push({ time: hourTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), cloud: clouds[i] });
                }
                if (nextClearStr === "None in 7 days" && hourTime >= now && isClear && isDark) {
                    nextClearStr = (hourTime < new Date(now.getTime() + 24*3600000)) ? "Tonight" : hourTime.toLocaleDateString(undefined, { weekday: 'short', day: 'numeric' });
                }
            }
            document.getElementById('val-window').innerText = nextClearStr;
            const icon = document.getElementById('status-icon');
            if (tonightHours.length > 0) {
                icon.innerText = "👍"; icon.style.color = "#4caf50";
                document.getElementById('status-text').innerText = "Tonight is Clear";
                document.getElementById('forecast-section').style.display = 'block';
                document.getElementById('hours-list').innerHTML = tonightHours.map(h => `<li class="hour-item"><b>${h.time}</b> - ${h.cloud}% Clouds</li>`).join('');
            } else {
                icon.innerText = "👎"; icon.style.color = "#f44336";
                document.getElementById('status-text').innerText = "Clouds Tonight";
            }
        }

        updateTargets();
        fetchAstroData();
    </script>
</body>
</html>
